site_name: MR18 OpenWrt -- JTAG Flash Documentation
site_description: Installing OpenWrt on a Cisco Meraki MR18 via JTAG
repo_url: https://github.com/bsikar/mr18-openwrt

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - search.suggest
    - content.code.copy

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - admonition
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Overview: overview.md
  - Guides:
    - Prerequisites: guides/prerequisites.md
    - Hardware Setup: guides/hardware-setup.md
    - Quick Start: guides/quickstart.md
    - Troubleshooting: guides/troubleshooting.md
  - Technical Deep-Dives:
    - MIPS Memory Model: technical/mips-memory-model.md
    - JTAG Timing Attack: technical/jtag-timing-attack.md
    - Image Loading & Verification: technical/image-loading.md
